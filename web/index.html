<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sensor Metrics Platform</title>
  <link rel="stylesheet" href="/web/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="container">
    <h1>Платформа сбора и визуализации данных датчиков</h1>

    <section id="auth-section" class="card">
      <h2>Вход</h2>
      <form id="login-form">
        <label>Логин <input type="text" id="username" required /></label>
        <label>Пароль <input type="password" id="password" required /></label>
        <button type="submit">Войти</button>
      </form>
      <p class="hint">Тестовые пользователи: admin/admin123, operator/operator123, viewer/viewer123</p>
      <p id="auth-error" class="error"></p>
    </section>

    <section id="app-section" class="hidden">
      <div class="toolbar">
        <span id="user-badge"></span>
        <button id="logout-btn">Выйти</button>
      </div>

      <div class="grid">
        <section class="card">
          <h2>Датчики</h2>
          <button id="refresh-sensors">Обновить</button>
          <ul id="sensors-list"></ul>
        </section>

        <section class="card">
          <h2>Показания</h2>
          <label>Sensor ID <input type="number" id="sensor-filter" min="1" /></label>
          <button id="load-readings">Загрузить</button>
          <canvas id="readings-chart" height="160"></canvas>
          <ul id="readings-list"></ul>
        </section>
      </div>

      <section class="card admin-only hidden" id="admin-users">
        <h2>Пользователи (admin)</h2>
        <button id="load-users">Загрузить пользователей</button>
        <ul id="users-list"></ul>
      </section>
    </section>
  </main>

  <script src="/web/app.js"></script>
</body>
</html>
